<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Grounded AI Strategy Chatbot</title>

  <!-- Markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* ---------- Layout & container ---------- */
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: stretch;
      height: 100vh;
    }

    .chat-container {
      background: #ffffff;
      width: 100%;
      max-width: 900px;
      margin: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f172a;
      color: #f9fafb;
    }

    .chat-header h1 {
      font-size: 16px;
      margin: 0;
    }

    .chat-header span {
      font-size: 12px;
      opacity: 0.8;
    }

    #timer {
      font-size: 12px;
      color: #6b7280;
      padding: 4px 16px;
    }

    .messages {
      padding: 16px;
      overflow-y: auto;
      flex: 1;
      background: #f3f4f6;
    }

    /* ---------- Message bubbles ---------- */
    .message {
      margin-bottom: 10px;
      max-width: 80%;
      padding: 10px 12px;
      border-radius: 10px;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 14px;
    }

    .message.user {
      margin-left: auto;
      background: #2563eb;
      color: #ffffff;
      border-bottom-right-radius: 2px;
    }

    .message.bot {
      margin-right: auto;
      background: #e5e7eb;
      color: #111827;
      border-bottom-left-radius: 2px;
      line-height: 1.2;
    }

    /* ---------- Markdown styling inside bot messages ---------- */

    /* Paragraphs */
    .message.bot p {
      margin: 0.25em 0;
    }

    /* Lists */
    .message.bot ul,
    .message.bot ol {
      margin: 0.25em 0;
      padding-left: 1.25em;
    }

    .message.bot li {
      margin: 0.1em 0;
    }

    /* Headings from markdown */
    .message.bot h1 {
      font-size: 1.2rem;
      margin: 0.35em 0 0.2em;
    }

    .message.bot h2 {
      font-size: 1.1rem;
      margin: 0.35em 0 0.2em;
    }

    .message.bot h3,
    .message.bot h4,
    .message.bot h5,
    .message.bot h6 {
      font-size: 1rem;
      margin: 0.35em 0 0.2em;
    }

    /* Tighten list for paragraph gap */
    .message.bot ul,
    .message.bot ol {
      margin-bottom: 0.2em;
    }

    .message.bot ul + p,
    .message.bot ol + p {
      margin-top: 0.2em;
    }

    /* Inline code */
    .message.bot code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
        "Liberation Mono", "Courier New", monospace;
      background: #e5e7eb;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 0.9em;
    }

    /* ---------- Input area ---------- */
    .typing {
      font-size: 12px;
      color: #6b7280;
      padding: 4px 16px 8px;
      background: #f9fafb;
    }

    .input-area {
      border-top: 1px solid #e5e7eb;
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      background: #f9fafb;
    }

    .input-area textarea {
      flex: 1;
      resize: none;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      padding: 8px;
      font-size: 14px;
      min-height: 40px;
      max-height: 120px;
      outline: none;
    }

    .input-area button {
      border: none;
      border-radius: 999px;
      padding: 0 16px;
      min-width: 80px;
      font-size: 14px;
      cursor: pointer;
      background: #0f172a;
      color: white;
    }

    .input-area button:disabled {
      opacity: 0.6;
      cursor: default;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>Grounded AI Strategy Chatbot</h1>
      <span>3 agents · 3 tasks per message using GPT-4.1</span>
    </div>

    <div id="timer">Response time: --</div>

    <div id="messages" class="messages">
      <div class="message bot">
        Hi! I'm a grounded AI Strategy Chatbot powered by CrewAI.<br />
        Ask me anything about Canada's AI Strategy - I'm here to help.
      </div>
    </div>

    <div id="typing" class="typing"></div>

    <div class="input-area">
      <textarea id="input" placeholder="Type your message and press Enter..."></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    // ---------- Timer ----------
    let timerInterval = null;
    let questionStartTime = null;

    function startTimer() {
      const t = document.getElementById("timer");
      questionStartTime = performance.now();
      t.textContent = "Waiting for response... 0.0 s";

      timerInterval = setInterval(() => {
        const elapsed = (performance.now() - questionStartTime) / 1000;
        t.textContent = `Waiting for response... ${elapsed.toFixed(1)} s`;
      }, 100);
    }

    function stopTimer() {
      if (!questionStartTime) return 0;
      const t = document.getElementById("timer");
      const elapsed = (performance.now() - questionStartTime) / 1000;

      clearInterval(timerInterval);
      timerInterval = null;
      questionStartTime = null;

      t.textContent = `Response time: ${elapsed.toFixed(2)} s`;
      return elapsed;
    }

    // ---------- Chat logic ----------
    const API_URL = "http://127.0.0.1:8000/chat";
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const typingEl = document.getElementById("typing");

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.className = "message " + sender;

      if (sender === "bot") {
        // Clean extra blank lines before rendering markdown
        const cleaned = text.replace(/^\s*$/gm, "").trim();
        div.innerHTML = marked.parse(cleaned);
      } else {
        // User text as plain text
        div.textContent = text;
      }

      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      addMessage(text, "user");
      startTimer();

      inputEl.value = "";
      typingEl.textContent = "Agent is thinking... (This may take a while)";
      sendBtn.disabled = true;

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });

        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();
        addMessage(data.reply || "[No reply returned]", "bot");
      } catch (err) {
        console.error(err);
        addMessage("Error talking to backend: " + err.message, "bot");
      } finally {
        stopTimer();
        typingEl.textContent = "";
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    // Send button
    sendBtn.addEventListener("click", sendMessage);

    // Enter to send, Shift+Enter for newline
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ---------- Local Markdown Test ----------
    function testMarkdown() {
      const sample = `
**Test Markdown Block**

Here is some markdown to test spacing:

- **Project Overview:**
  - First bullet item with some text.
  - Second bullet item with more text.

- **Key Findings:**
  - First key finding sentence.
  - Second key finding sentence.

This is a paragraph after a list.

**Second Section**

More bullets:

- Bullet A
- Bullet B
- Bullet C
`;

      const cleaned = sample.replace(/^\s*$/gm, "").trim();
      addMessage(cleaned, "bot");
    }

    // Expose for console testing
    window.testMarkdown = testMarkdown;
  </script>
</body>
</html>
